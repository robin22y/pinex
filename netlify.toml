[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"
  edge_functions = "netlify/edge-functions"

[[edge_functions]]
  path = "/stock/*"
  function = "stock-meta"

[functions]
  node_bundler = "esbuild"

[dev]
  command = "npm run dev"
  targetPort = 5173
  port = 8888
  framework = "#custom"

[build.environment]
  # Vite 8 requires Node >= 20.19 or >= 22.12 (was failing on 18 with CustomEvent undefined)
  NODE_VERSION = "20.19.0"
  # SPA reads Supabase at build time. Set either pair in Site env (scope: Builds):
  #   VITE_SUPABASE_URL + VITE_SUPABASE_ANON_KEY
  #   or SUPABASE_URL + SUPABASE_ANON_KEY (vite.config merges these into VITE_*)
  # Edge function stock-meta.js needs the same anon URL + key at runtime (all scopes).

# Cache static assets for 1 year
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Cache fonts
[[headers]]
  for = "*.woff2"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Never cache index.html
[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

# Never cache root
[[headers]]
  for = "/"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

# Don't cache other HTML
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
  for = "/sitemap.xml"
  [headers.values]
    Content-Type = "application/xml; charset=utf-8"

[[headers]]
  for = "/robots.txt"
  [headers.values]
    Content-Type = "text/plain; charset=utf-8"

# SPA fallback (static files in dist/ are served first)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"
  edge_functions = "netlify/edge-functions"

[[edge_functions]]
  path = "/stock/*"
  function = "stock-meta"

[functions]
  node_bundler = "esbuild"
  included_files = ["node_modules/ws/**"]

[dev]
  command = "npm run dev"
  targetPort = 5173
  port = 8888
  framework = "#custom"

[build.environment]
  NODE_VERSION = "22.12.0"
  AWS_LAMBDA_JS_RUNTIME = "nodejs22.x"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "*.woff2"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
  for = "/"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
  for = "/sitemap.xml"
  [headers.values]
    Content-Type = "application/xml; charset=utf-8"

[[headers]]
  for = "/robots.txt"
  [headers.values]
    Content-Type = "text/plain; charset=utf-8"

[[redirects]]
  from = "https://www.pinex.in/*"
  to = "https://pinex.in/:splat"
  status = 301
  force = true

[[redirects]]
  from = "http://www.pinex.in/*"
  to = "https://pinex.in/:splat"
  status = 301
  force = true

[[redirects]]
  from = "http://pinex.in/*"
  to = "https://pinex.in/:splat"
  status = 301
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

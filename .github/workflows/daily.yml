name: Daily Market Data Update

on:
  schedule:
    # 12:00 UTC = 5:30 PM IST — NSE bhav copy available by 5 PM IST; 30 min buffer.
    # Mon–Fri only; no data on weekends.
    - cron: "0 12 * * 1-5"
  workflow_dispatch:

concurrency:
  group: daily-market-data-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
      CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
      INDIANAPI_KEY: ${{ secrets.INDIANAPI_KEY }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      SHEETS_SPREADSHEET_ID: ${{ secrets.SHEETS_SPREADSHEET_ID }}
      SHEETS_SERVICE_ACCOUNT: scripts/service_account.json

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: scripts/requirements.txt

      - name: Install dependencies
        run: python -m pip install --upgrade pip && pip install -r scripts/requirements.txt

      # ── Data ingestion ──────────────────────────────────────────────────────

      - name: "(1/9) fetch_bhav_daily.py — EOD price + delivery bhav copy"
        continue-on-error: true
        run: |
          if ! timeout 900 python scripts/fetch_bhav_daily.py --force; then
            echo "::warning::fetch_bhav_daily.py failed or exceeded 15-minute timeout."
          fi

      - name: "(2/9) fetch_bse_announcements.py — BSE result announcements"
        continue-on-error: true
        run: |
          if ! timeout 300 python scripts/fetch_bse_announcements.py; then
            echo "::warning::fetch_bse_announcements.py failed or exceeded 5-minute timeout."
          fi

      - name: "(3/9) fetch_indianapi.py --tier=1 --news-only — Nifty 50 news (50 calls/day)"
        # ~50 calls/day. Tier-2 news runs weekly; financials/shareholding run quarterly.
        continue-on-error: true
        run: |
          if ! timeout 300 python scripts/fetch_indianapi.py --tier=1 --news-only; then
            echo "::warning::fetch_indianapi.py --tier=1 --news-only failed or exceeded 5-minute timeout."
          fi

      # ── Signal calculations ─────────────────────────────────────────────────

      - name: "(4/9) calc_delivery_signals.py"
        continue-on-error: true
        run: |
          if ! timeout 600 python scripts/calc_delivery_signals.py --full; then
            echo "::warning::calc_delivery_signals.py failed or exceeded 10-minute timeout."
          fi

      - name: "(5/9) calc_swing_conditions.py"
        continue-on-error: true
        run: |
          if ! timeout 600 python scripts/calc_swing_conditions.py; then
            echo "::warning::calc_swing_conditions.py failed or exceeded 10-minute timeout."
          fi

      - name: "(5b/9) substage.py — refine Stage 2 A/B substage classification"
        continue-on-error: true
        run: |
          if ! timeout 600 python scripts/substage.py; then
            echo "::warning::substage.py failed or exceeded 10-minute timeout."
          fi

      - name: "(6/9) calc_market_internals.py — breadth, stage distribution, 52W highs/lows"
        continue-on-error: true
        run: |
          if ! timeout 600 python scripts/calc_market_internals.py --force; then
            echo "::warning::calc_market_internals.py failed or exceeded 10-minute timeout."
          fi

      - name: "(6b/9) fix_rs.py — recalculate RS vs Nifty for all stocks"
        continue-on-error: true
        run: |
          if ! timeout 600 python scripts/fix_rs.py; then
            echo "::warning::fix_rs.py failed or exceeded 10-minute timeout."
          fi

      - name: "(7/9) fetch_nifty_sectors.py — sector index performance"
        continue-on-error: true
        run: |
          if ! timeout 300 python scripts/fetch_nifty_sectors.py; then
            echo "::warning::fetch_nifty_sectors.py failed or exceeded 5-minute timeout."
          fi

      - name: "(8/9) update_sectors.py"
        continue-on-error: true
        run: |
          if ! timeout 600 python scripts/update_sectors.py; then
            echo "::warning::update_sectors.py failed or exceeded 10-minute timeout."
          fi

      # ── Content + broadcast ─────────────────────────────────────────────────

      - name: "(9/9) generate_ai_content.py --daily-only"
        continue-on-error: true
        run: |
          if ! timeout 600 python scripts/generate_ai_content.py --daily-only; then
            echo "::warning::generate_ai_content.py --daily-only failed or exceeded 10-minute timeout."
          fi

      - name: "Write Google service account key"
        # Decode the base64-encoded service account JSON stored in GitHub Secrets.
        # To set this up: base64 -w0 service_account.json → copy output → add as
        # secret SHEETS_SERVICE_ACCOUNT_JSON in GitHub repo Settings → Secrets.
        if: ${{ secrets.SHEETS_SERVICE_ACCOUNT_JSON != '' }}
        run: |
          echo "${{ secrets.SHEETS_SERVICE_ACCOUNT_JSON }}" | base64 -d > scripts/service_account.json

      - name: "sheets_signal_tracker.py — SwingX signal export to Google Sheets"
        continue-on-error: true
        run: |
          if ! timeout 300 python scripts/sheets_signal_tracker.py; then
            echo "::warning::sheets_signal_tracker.py failed or exceeded 5-minute timeout."
          fi

      - name: "Telegram broadcast — daily market summary to channel"
        continue-on-error: true
        run: |
          if ! timeout 180 python scripts/telegram_broadcast.py daily; then
            echo "::warning::telegram_broadcast.py daily failed or exceeded 3-minute timeout."
          fi

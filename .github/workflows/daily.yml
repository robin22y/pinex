name: Daily Market Data Update

on:
  schedule:
    - cron: "0 12 * * 1-5"
  workflow_dispatch:

concurrency:
  group: daily-market-data-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
      INDIANAPI_KEY: ${{ secrets.INDIANAPI_KEY }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      SHEETS_SPREADSHEET_ID: ${{ secrets.SHEETS_SPREADSHEET_ID }}
      SHEETS_SERVICE_ACCOUNT: scripts/service_account.json

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: scripts/requirements.txt

      - name: Install dependencies
        run: python -m pip install --upgrade pip && pip install -r scripts/requirements.txt

      # ── Data ingestion ──────────────────────────────────────────────

      - name: "(1/7) fetch_bhav_daily.py — EOD price + delivery + RS + 52W high/low"
        continue-on-error: true
        run: |
          if ! timeout 900 python scripts/fetch_bhav_daily.py; then
            echo "::warning::fetch_bhav_daily.py failed or exceeded 15-minute timeout."
          fi

      - name: "(2/7) fetch_bse_announcements.py — BSE result announcements"
        continue-on-error: true
        run: |
          if ! timeout 300 python scripts/fetch_bse_announcements.py; then
            echo "::warning::fetch_bse_announcements.py failed or exceeded 5-minute timeout."
          fi

      # (Removed: fetch_indianapi.py was the (3/7) step pulling Nifty
      # 50 news via the 50-calls/day IndianAPI quota. Retired from
      # the daily cron — keep the script in scripts/ for ad-hoc
      # backfills but don't burn quota nightly.)

      # ── Signal calculations ─────────────────────────────────────────
      # ORDER MATTERS: calc_market_internals.py MUST run before
      # calc_delivery_signals.py because SwingX reads today's breadth
      # (above_ma30w_pct / above_ma150_pct) from market_internals to
      # evaluate the market-health condition. If breadth is stale,
      # SwingX entries oscillate around the 35% threshold and churn.

      - name: "(4/7) calc_market_internals.py — breadth, stage distribution"
        continue-on-error: true
        run: |
          if ! timeout 600 python scripts/calc_market_internals.py; then
            echo "::warning::calc_market_internals.py failed or exceeded 10-minute timeout."
          fi

      - name: "(5/7) calc_delivery_signals.py — SwingX + delivery signals (reads fresh breadth)"
        continue-on-error: true
        run: |
          if ! timeout 600 python scripts/calc_delivery_signals.py --full; then
            echo "::warning::calc_delivery_signals.py failed or exceeded 10-minute timeout."
          fi

      - name: "(5b/7) calc_swing_conditions.py — per-stock criteria score (feeds morning briefs)"
        continue-on-error: true
        run: |
          if ! timeout 600 python scripts/calc_swing_conditions.py; then
            echo "::warning::calc_swing_conditions.py failed or exceeded 10-minute timeout."
          fi

      - name: "generate_descriptions.py — daily Gemini-powered stock prose for StockDetail v2"
        continue-on-error: true
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          if ! timeout 900 python scripts/generate_descriptions.py; then
            echo "::warning::generate_descriptions.py failed or exceeded 15-minute timeout."
          fi

      - name: "(6/7) substage.py — Stage 2 A/B substage classification"
        continue-on-error: true
        run: |
          if ! timeout 600 python scripts/substage.py; then
            echo "::warning::substage.py failed or exceeded 10-minute timeout."
          fi

      - name: "(7/7) fetch_nifty_sectors.py + update_sectors.py — sector performance"
        continue-on-error: true
        run: |
          if ! timeout 300 python scripts/fetch_nifty_sectors.py; then
            echo "::warning::fetch_nifty_sectors.py failed or exceeded 5-minute timeout."
          fi
          if ! timeout 600 python scripts/update_sectors.py; then
            echo "::warning::update_sectors.py failed or exceeded 10-minute timeout."
          fi

      # ── Broadcast ───────────────────────────────────────────────────

      - name: "Write Google service account key"
        continue-on-error: true
        run: |
          if [ -n "${{ secrets.SHEETS_SERVICE_ACCOUNT_JSON }}" ]; then
            echo "${{ secrets.SHEETS_SERVICE_ACCOUNT_JSON }}" | base64 -d > scripts/service_account.json
          else
            echo "SHEETS_SERVICE_ACCOUNT_JSON not set, skipping"
          fi

      - name: "sheets_signal_tracker.py — SwingX export to Google Sheets"
        continue-on-error: true
        run: |
          if ! timeout 300 python scripts/sheets_signal_tracker.py; then
            echo "::warning::sheets_signal_tracker.py failed or exceeded 5-minute timeout."
          fi

      - name: "telegram_broadcast.py — daily market summary"
        continue-on-error: true
        run: |
          if ! timeout 180 python scripts/telegram_broadcast.py daily; then
            echo "::warning::telegram_broadcast.py daily failed or exceeded 3-minute timeout."
          fi

      # ── Per-user Morning Brief + Telegram DMs ───────────────────────
      # Order matters: brief generator must run BEFORE the DM sender so
      # today's morning_briefs rows exist when the DM script reads them.

      - name: "generate_morning_briefs.py — per-user brief cards"
        continue-on-error: true
        run: |
          if ! timeout 300 python scripts/generate_morning_briefs.py; then
            echo "::warning::generate_morning_briefs.py failed or exceeded 5-minute timeout."
          fi

      - name: "check_classifications.py — confirm user classifications + queue wow moments"
        continue-on-error: true
        run: |
          if ! timeout 600 python scripts/check_classifications.py; then
            echo "::warning::check_classifications.py failed or exceeded 10-minute timeout."
          fi

      - name: "send_telegram_watchlist_alerts.py — per-user DM (silent on no-change days)"
        continue-on-error: true
        run: |
          if ! timeout 300 python scripts/send_telegram_watchlist_alerts.py; then
            echo "::warning::send_telegram_watchlist_alerts.py failed or exceeded 5-minute timeout."
          fi

      # Self-heal is_latest + refresh mv_home_stocks. Runs LAST so
      # any half-finished writes from earlier steps get cleaned up
      # before the next pipeline run. Idempotent — when nothing's
      # broken this is a ~2 second no-op via the SQL function.
      - name: "repair_is_latest_and_refresh_view.py — self-heal screener"
        continue-on-error: true
        run: |
          if ! timeout 300 python scripts/repair_is_latest_and_refresh_view.py; then
            echo "::warning::repair_is_latest_and_refresh_view.py failed or exceeded 5-minute timeout."
          fi

      # (Removed: send_reengagement_email.py — absent-user nudge
      # emails. Now superseded by the per-user Telegram DMs +
      # MorningBrief card on /home. Re-engagement is handled by the
      # Telegram path; daily emails are no longer the primary
      # touchpoint. Script remains in scripts/ for one-off manual
      # blasts if needed.)
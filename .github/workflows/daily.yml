name: Daily Market Data Update

on:
  schedule:
    - cron: "0 11 * * *"
  workflow_dispatch:

concurrency:
  group: daily-market-data-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 85
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
      CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
      INDIANAPI_KEY: ${{ secrets.INDIANAPI_KEY }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: scripts/requirements.txt

      - name: Install dependencies
        run: python -m pip install --upgrade pip && pip install -r scripts/requirements.txt

      # Daily IndianAPI usage is news-only for tier-1 (~50 symbols, ~50 calls/day).
      # Tier-2 news refresh runs weekly (weekly.yml); financials + shareholding +
      # corporate actions run quarterly across all tiers (quarterly.yml).

      - name: "(1/6) fetch_bhav_daily.py"
        continue-on-error: true
        run: |
          if ! timeout 900 python scripts/fetch_bhav_daily.py; then
            echo "::warning::FAILURE NOTIFICATION — fetch_bhav_daily.py failed or exceeded 15-minute timeout."
          fi

      - name: "(2/6) Fetch news Nifty 50 (fetch_indianapi.py --tier=1 --news-only)"
        # Uses secrets.INDIANAPI_KEY + CLAUDE_API_KEY (news sentiment via score_sentiment).
        env:
          INDIANAPI_KEY: ${{ secrets.INDIANAPI_KEY }}
          CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
        continue-on-error: true
        run: |
          if ! timeout 1200 python scripts/fetch_indianapi.py --tier=1 --news-only; then
            echo "::warning::FAILURE NOTIFICATION — fetch_indianapi.py --tier=1 --news-only failed or exceeded 20-minute timeout."
          fi

      - name: "(3/6) calc_delivery_signals.py"
        continue-on-error: true
        run: |
          if ! timeout 600 python scripts/calc_delivery_signals.py; then
            echo "::warning::FAILURE NOTIFICATION — calc_delivery_signals.py failed or exceeded 10-minute timeout."
          fi

      - name: "(4/6) calc_swing_conditions.py"
        continue-on-error: true
        run: |
          if ! timeout 600 python scripts/calc_swing_conditions.py; then
            echo "::warning::FAILURE NOTIFICATION — calc_swing_conditions.py failed or exceeded 10-minute timeout."
          fi

      - name: "(5/6) update_sectors.py"
        continue-on-error: true
        run: |
          if ! timeout 600 python scripts/update_sectors.py; then
            echo "::warning::FAILURE NOTIFICATION — update_sectors.py failed or exceeded 10-minute timeout."
          fi

      - name: "(6/6) generate_ai_content.py --daily-only"
        continue-on-error: true
        run: |
          if ! timeout 600 python scripts/generate_ai_content.py --daily-only; then
            echo "::warning::FAILURE NOTIFICATION — generate_ai_content.py --daily-only failed or exceeded 10-minute timeout."
          fi

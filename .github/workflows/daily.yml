name: Daily Market Data Update

on:
  schedule:
    - cron: "0 12 * * 1-5"
  workflow_dispatch:

concurrency:
  group: daily-market-data-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
      INDIANAPI_KEY: ${{ secrets.INDIANAPI_KEY }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      SHEETS_SPREADSHEET_ID: ${{ secrets.SHEETS_SPREADSHEET_ID }}
      SHEETS_SERVICE_ACCOUNT: scripts/service_account.json

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: scripts/requirements.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install dependencies
        run: python -m pip install --upgrade pip && pip install -r scripts/requirements.txt

      # ── Data ingestion ──────────────────────────────────────────────

      - name: "(1/7) fetch_bhav_daily.py — EOD price + delivery + RS + 52W high/low"
        continue-on-error: true
        run: |
          if ! timeout 900 python scripts/fetch_bhav_daily.py; then
            echo "::warning::fetch_bhav_daily.py failed or exceeded 15-minute timeout."
          fi

      - name: "(2/7) fetch_bse_announcements.py — BSE result announcements"
        continue-on-error: true
        run: |
          if ! timeout 300 python scripts/fetch_bse_announcements.py; then
            echo "::warning::fetch_bse_announcements.py failed or exceeded 5-minute timeout."
          fi

      # (Removed: fetch_indianapi.py was the (3/7) step pulling Nifty
      # 50 news via the 50-calls/day IndianAPI quota. Retired from
      # the daily cron — keep the script in scripts/ for ad-hoc
      # backfills but don't burn quota nightly.)

      # ── Signal calculations ─────────────────────────────────────────
      # ORDER MATTERS: calc_market_internals.py MUST run before
      # calc_delivery_signals.py because SwingX reads today's breadth
      # (above_ma30w_pct / above_ma150_pct) from market_internals to
      # evaluate the market-health condition. If breadth is stale,
      # SwingX entries oscillate around the 35% threshold and churn.

      - name: "(4/7) calc_market_internals.py — breadth, stage distribution, 52W highs/lows"
        continue-on-error: true
        run: |
          if ! timeout 600 python scripts/calc_market_internals.py; then
            echo "::warning::calc_market_internals.py failed or exceeded 10-minute timeout."
          fi

      # ── 52W highs/lows integration ──────────────────────────────────
      # ARCHITECTURE CHANGE (25 Jun 2026): calc_market_internals.py now
      # imports fetch_52w_counts() directly and writes 52W data in the
      # same upsert with all other breadth metrics. This removes the
      # workflow ordering dependency that caused:
      #   - fetch_52w_highs_lows --update failing if row didn't exist yet
      #   - Recurring "0 highs/lows" issues when order was wrong
      #   - Timeouts and race conditions with separate UPDATE step
      #
      # The fetch_52w_highs_lows.py script is retained for manual CLI use
      # (--update flag) but is no longer part of the daily workflow.
      # No separate step 4b needed.

      - name: "(5/7) calc_delivery_signals.py — SwingX + delivery signals (reads fresh breadth)"
        continue-on-error: true
        run: |
          if ! timeout 1200 python scripts/calc_delivery_signals.py --full; then
            echo "::warning::calc_delivery_signals.py failed or exceeded 20-minute timeout."
          fi

      # The swing step's own internal health gate (MIN_EXPECTED_PROCESSED
      # = 1000) now exits non-zero on a partial pipeline run, and we
      # propagate that exit (continue-on-error: false). Set timeout
      # generously so a legitimately slow run isn't killed first.
      # Increased to 30 min (1800s) to allow full processing of ~2100 companies
      # with chunked upserts. Script handles SIGTERM gracefully to save partial progress.
      - name: "(5b/7) calc_swing_conditions.py — per-stock criteria score (feeds morning briefs)"
        continue-on-error: false
        run: |
          timeout 1800 python scripts/calc_swing_conditions.py

      # External verification — re-read swing_conditions for today's
      # date and confirm we wrote enough rows. Belt to the script's
      # internal MIN_EXPECTED_PROCESSED braces. Catches the cases
      # where the script writes nothing because of a crash before
      # the gate check (e.g. an unhandled exception in the upsert
      # loop on row 5). Exit 1 here fails the job visibly.
      - name: "(5b verify) swing_conditions today's row count >= 1000"
        run: |
          python - <<'PY'
          import os, sys
          from datetime import date
          from supabase import create_client
          url = os.environ["SUPABASE_URL"]
          key = os.environ["SUPABASE_SERVICE_KEY"]
          sb = create_client(url, key)
          today = date.today().isoformat()
          res = (
              sb.table("swing_conditions")
              .select("company_id", count="exact", head=True)
              .eq("date", today)
              .execute()
          )
          count = res.count or 0
          print(f"swing_conditions[{today}] rows={count}")
          if count < 1000:
              print(
                  f"ERROR: only {count} rows for today, expected >= 1000. "
                  "Pipeline likely partial — fail the job.",
                  file=sys.stderr,
              )
              sys.exit(1)
          PY

      # (5b breadth) per-date advances/declines + cumulative A-D line
      # for the Pulse page's 90-day participation chart. Runs after
      # calc_swing_conditions so its own failure can't block SwingX,
      # and runs on the same trading day's data calc_market_internals
      # already populated. Failure is non-fatal — the chart simply
      # shows a stale series until the next successful run.
      - name: "(5b breadth) calc_market_breadth.py — 90-day A/D + cumulative"
        continue-on-error: true
        run: |
          if ! timeout 300 python scripts/calc_market_breadth.py; then
            echo "::warning::calc_market_breadth.py failed or exceeded 5-minute timeout."
          fi

      # Admin-only diff of the canonical SwingX cohort vs the previous
      # trading day. Writes a usage_events row (always) + sends a
      # Telegram DM to TELEGRAM_ADMIN_CHAT_ID (when that env var is set
      # — keep it OUT of the public TELEGRAM_CHANNEL_ID). Used for
      # daily quality checks ("AMBER was in yesterday's list, why
      # not today?"). Stock NAMES never go to the public channel.
      - name: "(5c/7) audit_swingx_changes.py — admin entries/exits diff"
        continue-on-error: true
        env:
          TELEGRAM_ADMIN_CHAT_ID: ${{ secrets.TELEGRAM_ADMIN_CHAT_ID }}
        run: |
          if ! timeout 120 python scripts/audit_swingx_changes.py; then
            echo "::warning::audit_swingx_changes.py failed or exceeded 2-minute timeout."
          fi

      - name: "generate_descriptions.py — daily Gemini-powered stock prose for StockDetail v2"
        continue-on-error: true
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          if ! timeout 900 python scripts/generate_descriptions.py; then
            echo "::warning::generate_descriptions.py failed or exceeded 15-minute timeout."
          fi

      - name: "(6/7) substage.py — Stage 2 A/B substage classification"
        continue-on-error: true
        run: |
          if ! timeout 600 python scripts/substage.py; then
            echo "::warning::substage.py failed or exceeded 10-minute timeout."
          fi

      - name: "(7/7) fetch_nifty_sectors.py + update_sectors.py — sector performance"
        continue-on-error: true
        run: |
          if ! timeout 300 python scripts/fetch_nifty_sectors.py; then
            echo "::warning::fetch_nifty_sectors.py failed or exceeded 5-minute timeout."
          fi
          if ! timeout 600 python scripts/update_sectors.py; then
            echo "::warning::update_sectors.py failed or exceeded 10-minute timeout."
          fi

      # ── Broadcast ───────────────────────────────────────────────────

      - name: "Write Google service account key"
        continue-on-error: true
        run: |
          if [ -n "${{ secrets.SHEETS_SERVICE_ACCOUNT_JSON }}" ]; then
            echo "${{ secrets.SHEETS_SERVICE_ACCOUNT_JSON }}" | base64 -d > scripts/service_account.json
          else
            echo "SHEETS_SERVICE_ACCOUNT_JSON not set, skipping"
          fi

      - name: "sheets_signal_tracker.py — SwingX export to Google Sheets"
        continue-on-error: true
        run: |
          if ! timeout 300 python scripts/sheets_signal_tracker.py; then
            echo "::warning::sheets_signal_tracker.py failed or exceeded 5-minute timeout."
          fi

      - name: "telegram_broadcast.py — daily market summary"
        continue-on-error: true
        run: |
          if ! timeout 180 python scripts/telegram_broadcast.py daily; then
            echo "::warning::telegram_broadcast.py daily failed or exceeded 3-minute timeout."
          fi

      # ── Per-user Morning Brief + Telegram DMs ───────────────────────
      # Order matters: brief generator must run BEFORE the DM sender so
      # today's morning_briefs rows exist when the DM script reads them.

      - name: "generate_morning_briefs.py — per-user brief cards"
        continue-on-error: true
        run: |
          if ! timeout 300 python scripts/generate_morning_briefs.py; then
            echo "::warning::generate_morning_briefs.py failed or exceeded 5-minute timeout."
          fi

      - name: "check_classifications.py — confirm user classifications + queue wow moments"
        continue-on-error: true
        run: |
          if ! timeout 600 python scripts/check_classifications.py; then
            echo "::warning::check_classifications.py failed or exceeded 10-minute timeout."
          fi

      - name: "send_telegram_watchlist_alerts.py — per-user DM (silent on no-change days)"
        continue-on-error: true
        run: |
          if ! timeout 300 python scripts/send_telegram_watchlist_alerts.py; then
            echo "::warning::send_telegram_watchlist_alerts.py failed or exceeded 5-minute timeout."
          fi

      # Self-heal is_latest + refresh mv_home_stocks. Runs before
      # streaks so any half-finished writes from earlier steps get
      # cleaned up before the next pipeline run. Idempotent — when
      # nothing's broken this is a ~2 second no-op via the SQL
      # function.
      - name: "repair_is_latest_and_refresh_view.py — self-heal screener"
        continue-on-error: true
        run: |
          if ! timeout 300 python scripts/repair_is_latest_and_refresh_view.py; then
            echo "::warning::repair_is_latest_and_refresh_view.py failed or exceeded 5-minute timeout."
          fi

      # ── Engagement / points ─────────────────────────────────────────
      # calc_streaks runs LAST. Depends on last_active_at being
      # written by user activity during the day, so we want every
      # interactive read (morning briefs, Telegram DMs, screener
      # refreshes above) to have fired first. Awards 2 pts for daily
      # login (gated by points_config) + milestone bonuses at 3 / 7 /
      # 14 / 30 / 100-day streaks. Idempotent — running twice on the
      # same UTC day is a no-op for already-processed users.
      - name: "calc_streaks.py — daily-login points + streak tracking"
        continue-on-error: true
        run: |
          if ! timeout 600 python scripts/calc_streaks.py; then
            echo "::warning::calc_streaks.py failed or exceeded 10-minute timeout."
          fi

      # (Removed: send_reengagement_email.py — absent-user nudge
      # emails. Now superseded by the per-user Telegram DMs +
      # MorningBrief card on /home. Re-engagement is handled by the
      # Telegram path; daily emails are no longer the primary
      # touchpoint. Script remains in scripts/ for one-off manual
      # blasts if needed.)
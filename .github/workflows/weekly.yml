name: Weekly AI Full Regeneration

on:
  schedule:
    # Sunday 06:00 UTC — regenerate all company descriptions with fresh financials
    - cron: "0 6 * * 0"
  workflow_dispatch:

concurrency:
  group: weekly-ai-full-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  regenerate:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
      CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
      INDIANAPI_KEY: ${{ secrets.INDIANAPI_KEY }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: scripts/requirements.txt

      - name: Install dependencies
        run: python -m pip install --upgrade pip && pip install -r scripts/requirements.txt

      # Tier-2 (~450 symbols) news refresh — ~450 calls, ~12 min at 1.5s/req.
      # Runs before AI regeneration so fresh news lands in the company copy.
      - name: Fetch news Nifty 500 (fetch_indianapi.py --tier=2 --news-only)
        continue-on-error: true
        run: |
          if ! timeout 1800 python scripts/fetch_indianapi.py --tier=2 --news-only; then
            echo "::warning::FAILURE NOTIFICATION — fetch_indianapi.py --tier=2 --news-only failed or exceeded 30-minute timeout."
          fi

      - name: generate_ai_content.py --full
        run: python scripts/generate_ai_content.py --full

      # AI-generated weekly market broadcast — runs after data is refreshed.
      - name: generate_telegram_broadcast.py — weekly channel broadcast
        continue-on-error: true
        run: |
          if ! timeout 120 python scripts/generate_telegram_broadcast.py; then
            echo "::warning::generate_telegram_broadcast.py failed or exceeded 2-minute timeout."
          fi

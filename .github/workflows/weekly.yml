name: Weekly AI Full Regeneration

on:
  schedule:
    # Sunday 06:00 UTC — regenerate all company descriptions with fresh financials
    - cron: "0 6 * * 0"
  workflow_dispatch:

concurrency:
  group: weekly-ai-full-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  regenerate:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
      CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
      INDIANAPI_KEY: ${{ secrets.INDIANAPI_KEY }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: scripts/requirements.txt

      - name: Install dependencies
        run: python -m pip install --upgrade pip && pip install -r scripts/requirements.txt

      # Update market cap classification — IndianAPI
      # source (~2125 stocks × ~0.5s ≈ 18 min).
      # Runs FIRST so a failure here doesn't block
      # the longer AI regeneration that follows.
      - name: fetch_market_cap.py — refresh market cap + cap_category
        continue-on-error: true
        run: |
          if ! timeout 3600 python scripts/fetch_market_cap.py --source=indianapi; then
            echo "::warning::fetch_market_cap.py failed or exceeded 60-minute timeout."
          fi

      # Tier-2 (~450 symbols) news refresh — ~450 calls, ~12 min at 1.5s/req.
      # Runs before AI regeneration so fresh news lands in the company copy.
      - name: Fetch news Nifty 500 (fetch_indianapi.py --tier=2 --news-only)
        continue-on-error: true
        run: |
          if ! timeout 1800 python scripts/fetch_indianapi.py --tier=2 --news-only; then
            echo "::warning::FAILURE NOTIFICATION — fetch_indianapi.py --tier=2 --news-only failed or exceeded 30-minute timeout."
          fi

      - name: generate_ai_content.py --full
        run: python scripts/generate_ai_content.py --full

      # AI-generated weekly market broadcast — runs after data is refreshed.
      - name: telegram_broadcast.py — weekly channel broadcast
        continue-on-error: true
        run: |
          if ! timeout 120 python scripts/telegram_broadcast.py channel; then
            echo "::warning::telegram_broadcast.py channel failed or exceeded 2-minute timeout."
          fi

      # ── Fundamentals refresh ────────────────────────────────────────
      # Pull 15 standard fundamentals per company from IndianAPI →
      # key_metrics table. ~2,100 stocks × 0.2 s rate-limit pause ≈
      # 7-10 min wall-clock. Continue-on-error so a partial failure
      # doesn't abort the surrounding pipeline; per-row errors are
      # swallowed inside the script.
      - name: fetch_fundamentals.py — IndianAPI key_metrics refresh
        continue-on-error: true
        run: |
          if ! timeout 1800 python scripts/fetch_fundamentals.py; then
            echo "::warning::fetch_fundamentals.py failed or exceeded 30-minute timeout."
          fi

      # ── Company narrative refresh ───────────────────────────────────
      # Pull company_overview (about, business_model, products,
      # founding, HQ, etc.) for any stock whose row is missing or
      # > 30 days stale. Runs AFTER fetch_fundamentals so an
      # IndianAPI rate spike on the metrics side is absorbed before
      # we ask for the heavier profile payload. Most weeks this is
      # close to a no-op because the freshness gate skips fresh rows.
      - name: fetch_company_overview.py — IndianAPI profile refresh
        continue-on-error: true
        run: |
          if ! timeout 1800 python scripts/fetch_company_overview.py; then
            echo "::warning::fetch_company_overview.py failed or exceeded 30-minute timeout."
          fi

      # ── yfinance fundamentals refresh ───────────────────────────────
      # Writes the wider 14-field key_metrics row (forward_pe, roa,
      # margins / growth, beta, 52W high/low — the columns the
      # IndianAPI fetcher above doesn't expose) AND populates the
      # separate quarterly_financials_yf table (~4 rows per symbol).
      # Runs LAST in the fundamentals chain so on overlapping
      # key_metrics columns (market_cap / pe_ratio / etc.) yf is the
      # winner — yf returns richer fields and is what the Research
      # Assistant's quarterly prompt now reads. ~2,100 symbols ×
      # 0.5 s yfinance pause ≈ 18-22 min wall-clock.
      - name: fetch_fundamentals_yf.py — yfinance key_metrics + quarterly refresh
        continue-on-error: true
        run: |
          if ! timeout 2700 python scripts/fetch_fundamentals_yf.py; then
            echo "::warning::fetch_fundamentals_yf.py failed or exceeded 45-minute timeout."
          fi

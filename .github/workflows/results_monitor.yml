name: Results Monitor

on:
  schedule:
    - cron: "*/15 3-12 * * 1-5"
  workflow_dispatch:
    inputs:
      symbol:
        description: "Optional symbol for one-off results alert broadcast"
        required: false
        default: ""

jobs:
  run-results-monitor:
    runs-on: ubuntu-latest
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
      CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Run results monitor
        run: cd scripts && python run_results_monitor.py

      - name: Send result filing alert (symbol from dispatch input)
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.symbol != '' }}
        run: cd scripts && python telegram_broadcast.py --results "${{ github.event.inputs.symbol }}"

name: Biannual Company Description Refresh

on:
  schedule:
    # 06:00 UTC on Jan 1 and Jul 1 — exactly 6 months apart. The bulk
    # Gemini script rewrites companies.description for every stock; at
    # 2,100 symbols × 4 s polite delay ≈ 2.5 h wall-clock, so we want
    # this off the normal daily / weekly cron lanes.
    - cron: "0 6 1 1,7 *"
  workflow_dispatch:

concurrency:
  group: biannual-descriptions-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  regenerate:
    runs-on: ubuntu-latest
    timeout-minutes: 240
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: scripts/requirements.txt

      - name: Install dependencies
        run: python -m pip install --upgrade pip && pip install -r scripts/requirements.txt

      - name: generate_descriptions_gemini.py — refresh companies.description for all stocks
        run: python scripts/generate_descriptions_gemini.py --new-only

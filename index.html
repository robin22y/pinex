<!doctype html>
<html lang="en">
  <head>
    <script>
      // Sepia is the default first-visit theme. Only DARK is an
      // explicit opt-in stored as 'dark' in localStorage; everything
      // else (including missing key, parse error) renders sepia.
      (function() {
        try {
          var t = localStorage.getItem('pinex-theme')
          if (t !== 'dark')
            document.documentElement.setAttribute('data-theme', 'sepia')
        } catch(e) {
          document.documentElement.setAttribute('data-theme', 'sepia')
        }
      })()
    </script>
    <!-- Cache-Control is set via HTTP headers in public/_headers.txt
         (HTML = max-age=0 must-revalidate, hashed assets = immutable).
         The old meta http-equiv Cache-Control / Pragma / Expires
         tags were REMOVED — they conflicted with the HTTP headers
         in some browsers and caused inconsistent revalidation.
         Modern browsers ignore meta cache-control for sub-resources
         anyway; HTTP headers are the only reliable mechanism. -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Flaticon UICONS used to be loaded here as a 230 KB render-blocking
         stylesheet. Removed June 2026 — every icon is now rendered via
         src/components/ui/Icon.jsx which imports the matching lucide-react
         SVG component (tree-shakeable, ships only the icons we use).
         If you re-add Flaticon, also remove the lucide MAP entries for
         the names you re-introduce so the lookup precedence stays
         predictable. -->


    <!-- JetBrains Mono — applied via the .num utility class in
         src/index.css for any numeric value across the app. Tabular
         figures so columns of numbers line up. preconnect to the
         font CDN cuts ~150ms off the font swap. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=optional"
    />

    <title>PineX — Market Structure</title>
    <!-- Static fallback meta only. All per-page meta (description,
         og:*, twitter:*) is rendered by the page-level <Helmet> in
         each route so LinkedIn / X / Facebook / Slack scrapers see
         exactly one instance per tag — the page's own. DefaultSeo
         provides the site-wide fallbacks (keywords, robots, theme,
         geo, og:locale/site_name, twitter:image:alt, JSON-LD). -->
    <meta
      name="description"
      content="PineX — Market structure intelligence for Indian retail traders. See what to look at before you open charts."
    />
    <meta
      name="keywords"
      content="indian stock screener, NSE stock analysis, stage analysis india, stage 2 stocks, swing trading india, nifty stocks screener, delivery volume NSE, stock market india, free stock screener india, nifty 500 stocks, SwingX"
    />
    <meta name="author" content="PineX" />
    <meta name="robots" content="index, follow" />
    <!-- Canonical is owned by the page-level <Helmet> in each route now,
         so Lighthouse only sees one canonical per page instead of three
         (this file + DefaultSeo + page). DefaultSeo also no longer emits
         one so static pages without their own Helmet fall through to
         "no canonical → use current URL" — Google's expected behaviour. -->
    <link rel="sitemap" type="application/xml" title="Sitemap" href="/sitemap.xml" />

    <meta property="og:locale" content="en_IN" />
    <meta property="og:site_name" content="PineX" />

    <meta name="twitter:image" content="https://pinex.in/og-image.png" />

    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": "PineX",
        "url": "https://pinex.in",
        "description": "Indian stock market intelligence platform using cycle analysis for NSE stocks",
        "applicationCategory": "FinanceApplication",
        "operatingSystem": "Web, iOS, Android",
        "offers": {
          "@type": "Offer",
          "price": "0",
          "priceCurrency": "INR"
        },
        "featureList": [
          "NSE Stock Screener",
          "Stage Analysis",
          "SwingX Setups",
          "Delivery Volume Analysis",
          "Market Breadth",
          "Shareholding Patterns"
        ],
        "audience": {
          "@type": "Audience",
          "audienceType": "Indian retail investors"
        }
      }
    </script>

    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Dataset",
        "name": "PineX NSE Cycle Analysis",
        "description": "Daily cycle stage classification for 2,125 NSE stocks. Advancing, Basing, Topping and Declining stages updated daily.",
        "url": "https://pinex.in",
        "license": "https://creativecommons.org/licenses/by-nc/4.0/",
        "creator": {
          "@type": "Organization",
          "name": "PineX",
          "url": "https://pinex.in"
        },
        "keywords": [
          "NSE stocks",
          "cycle analysis",
          "swing trading",
          "Indian stock market"
        ]
      }
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- Newsreader = body serif for the cycle narrative. display=optional
         means if the font doesn't arrive in ~100 ms the page stays on
         fallback for the whole page-view (no swap, no shift); on the
         next visit the font is cached and used immediately.
         Noto Sans Malayalam used to ride along on this stylesheet but
         the vast majority of visitors are en-IN — they were paying for
         a font they never rendered. It's now injected below ONLY when
         the user has selected Malayalam (see pinex_lang). -->
    <link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,300..700;1,6..72,300..700&display=optional" rel="stylesheet">
    <script>
      // Conditionally load the Malayalam glyph font. Newsreader doesn't
      // carry Malayalam glyphs; without an explicit font the browser
      // falls back to a system font that varies wildly across devices.
      // For the English default (>90% of traffic) we skip this entirely
      // and save the request + transfer.
      (function() {
        try {
          if (localStorage.getItem('pinex_lang') === 'ml') {
            var l = document.createElement('link')
            l.rel = 'stylesheet'
            l.href = 'https://fonts.googleapis.com/css2?family=Noto+Sans+Malayalam:wght@400;600;700&display=optional'
            document.head.appendChild(l)
          }
        } catch (e) {}
      })()
    </script>
    <!-- Loading shell — visible the instant the HTML reaches the
         browser. Without this, mobile users on a cold cache stared
         at a fully white screen for the 3-5 seconds it takes to
         download + parse + hydrate the JS bundle. Now they see the
         brand mark + a subtle spinner immediately.

         Replaced as soon as React mounts (createRoot() blows away
         the existing children of #root and writes the app tree).
         Inline so it works with zero CSS network requests and zero
         FOUC. Colour palette matches the dark surface used everywhere
         in the app (#0B0D0F base / amber accent #F59F0B). -->
    <style>
      html, body { margin: 0; padding: 0; background: #0B0D0F; }
      #app-loading-shell {
        position: fixed; inset: 0;
        display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        gap: 18px;
        background: #0B0D0F;
        color: #E5E7EB;
        font: 500 14px/1.4 system-ui, -apple-system, "Segoe UI", sans-serif;
        letter-spacing: -0.01em;
      }
      #app-loading-shell .brand {
        font-size: 28px; font-weight: 600;
        letter-spacing: -0.03em;
        color: #F5F5F5;
      }
      #app-loading-shell .brand .accent { color: #F59F0B; }
      #app-loading-shell .spinner {
        width: 28px; height: 28px;
        border-radius: 50%;
        border: 2px solid rgba(245, 159, 11, 0.18);
        border-top-color: #F59F0B;
        animation: spin 0.9s linear infinite;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <div id="root">
      <div id="app-loading-shell">
        <div class="brand">Pine<span class="accent">X</span></div>
        <div class="spinner" aria-hidden="true"></div>
      </div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>

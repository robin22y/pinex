<!doctype html>
<html lang="en">
  <head>
    <script>
      // Sepia is the default first-visit theme. Only DARK is an
      // explicit opt-in stored as 'dark' in localStorage; everything
      // else (including missing key, parse error) renders sepia.
      (function() {
        try {
          var t = localStorage.getItem('pinex-theme')
          if (t !== 'dark')
            document.documentElement.setAttribute('data-theme', 'sepia')
        } catch(e) {
          document.documentElement.setAttribute('data-theme', 'sepia')
        }
      })()
    </script>
    <!-- Cache-Control is set via HTTP headers in public/_headers.txt
         (HTML = max-age=0 must-revalidate, hashed assets = immutable).
         The old meta http-equiv Cache-Control / Pragma / Expires
         tags were REMOVED — they conflicted with the HTTP headers
         in some browsers and caused inconsistent revalidation.
         Modern browsers ignore meta cache-control for sub-resources
         anyway; HTTP headers are the only reliable mechanism. -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Flaticon UICONS — Regular Rounded set (contains all finance,
         interface, and general icons). Filtering on flaticon.com/.../finance
         is just a category view; the actual font file is the rounded set
         and IS where fi-rr-coins, fi-rr-trophy, fi-rr-bank etc. live.
         Usage: <i class="fi fi-rr-coins"></i>
         CDN preconnect so the font file fetches in parallel with the CSS. -->
    <link rel="preconnect" href="https://cdn-uicons.flaticon.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://cdn-uicons.flaticon.com/uicons-regular-rounded/css/uicons-regular-rounded.css"
    />

    <title>PineX — Indian Stock Market Intelligence | Stage Analysis &amp; SwingX Setups</title>
    <meta
      name="description"
      content="PineX tracks 2100+ NSE stocks using cycle analysis. Find Stage 2 uptrend stocks, delivery data, SwingX setups and market breadth data. Free for Indian retail investors."
    />
    <meta
      name="keywords"
      content="indian stock screener, NSE stock analysis, stage analysis india, stage 2 stocks, swing trading india, nifty stocks screener, delivery volume NSE, stock market india, free stock screener india, nifty 500 stocks, SwingX"
    />
    <meta name="author" content="PineX" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://pinex.in/" />
    <link rel="sitemap" type="application/xml" title="Sitemap" href="/sitemap.xml" />

    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://pinex.in/" />
    <meta property="og:title" content="PineX — Indian Stock Intelligence Platform" />
    <meta
      property="og:description"
      content="Track 2100+ NSE stocks with Stage Analysis, SwingX setups and delivery data. Free market intelligence for Indian investors."
    />
    <meta property="og:image" content="https://pinex.in/og-image.png" />
    <meta property="og:locale" content="en_IN" />
    <meta property="og:site_name" content="PineX" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="PineX — Indian Stock Intelligence" />
    <meta
      name="twitter:description"
      content="Free NSE stock screener with Stage Analysis and SwingX setups."
    />
    <meta name="twitter:image" content="https://pinex.in/og-image.png" />

    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": "PineX",
        "url": "https://pinex.in",
        "description": "Indian stock market intelligence platform using cycle analysis for NSE stocks",
        "applicationCategory": "FinanceApplication",
        "operatingSystem": "Web, iOS, Android",
        "offers": {
          "@type": "Offer",
          "price": "0",
          "priceCurrency": "INR"
        },
        "featureList": [
          "NSE Stock Screener",
          "Stage Analysis",
          "SwingX Setups",
          "Delivery Volume Analysis",
          "Market Breadth",
          "Shareholding Patterns"
        ],
        "audience": {
          "@type": "Audience",
          "audienceType": "Indian retail investors"
        }
      }
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- Newsreader = body serif for the cycle narrative.
         Noto Sans Malayalam = Malayalam-locale UI strings + the
         post-response translation in the Research Assistant. Newsreader
         doesn't carry Malayalam glyphs; without an explicit Malayalam
         font the browser falls back to a system font that varies wildly
         across devices (and often clips descenders). display=swap on
         both so first paint isn't blocked on font load. -->
    <link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,300..700;1,6..72,300..700&family=Noto+Sans+Malayalam:wght@400;600;700&display=swap" rel="stylesheet">
    <!-- Loading shell — visible the instant the HTML reaches the
         browser. Without this, mobile users on a cold cache stared
         at a fully white screen for the 3-5 seconds it takes to
         download + parse + hydrate the JS bundle. Now they see the
         brand mark + a subtle spinner immediately.

         Replaced as soon as React mounts (createRoot() blows away
         the existing children of #root and writes the app tree).
         Inline so it works with zero CSS network requests and zero
         FOUC. Colour palette matches the dark surface used everywhere
         in the app (#0B0D0F base / amber accent #F59F0B). -->
    <style>
      html, body { margin: 0; padding: 0; background: #0B0D0F; }
      #app-loading-shell {
        position: fixed; inset: 0;
        display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        gap: 18px;
        background: #0B0D0F;
        color: #E5E7EB;
        font: 500 14px/1.4 system-ui, -apple-system, "Segoe UI", sans-serif;
        letter-spacing: -0.01em;
      }
      #app-loading-shell .brand {
        font-size: 28px; font-weight: 600;
        letter-spacing: -0.03em;
        color: #F5F5F5;
      }
      #app-loading-shell .brand .accent { color: #F59F0B; }
      #app-loading-shell .spinner {
        width: 28px; height: 28px;
        border-radius: 50%;
        border: 2px solid rgba(245, 159, 11, 0.18);
        border-top-color: #F59F0B;
        animation: spin 0.9s linear infinite;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <div id="root">
      <div id="app-loading-shell">
        <div class="brand">Pine<span class="accent">X</span></div>
        <div class="spinner" aria-hidden="true"></div>
      </div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
